name: Automated Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create CI env file
        run: |
          cat <<EOF > .env
          DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_DEBUG=true
          DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1
          DJANGO_CORS_ALLOWED_ORIGINS=http://localhost:5173
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          LANGSMITH_TRACING=true
          LANGSMITH_ENDPOINT=https://api.smith.langchain.com
          LANGSMITH_PROJECT=skn25-test
          LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}
          POSTGRES_DB=skn25
          POSTGRES_USER=skn25
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_HOST=db
          POSTGRES_PORT=5432
          BACKEND_PORT=8000
          FRONTEND_PORT=5173
          EOF

      - name: Build containers
        run: docker compose build backend

      - name: Start services
        run: docker compose up -d backend db

      - name: Wait for database
        run: |
          for i in {1..20}; do
            if docker compose exec -T db pg_isready -U skn25 -d skn25; then
              exit 0
            fi
            sleep 3
          done
          exit 1

      - name: Debug service status
        if: always()
        run: docker compose ps

      - name: Debug backend logs before migrations
        if: always()
        run: docker compose logs backend --tail=200

      - name: Run migrations
        run: docker compose exec -T backend python manage.py migrate --noinput

      - name: Run backend tests
        run: docker compose exec -T backend pytest

      - name: Debug backend logs after failure
        if: failure()
        run: docker compose logs backend --tail=200

      - name: Stop containers
        if: always()
        run: docker compose down -v
